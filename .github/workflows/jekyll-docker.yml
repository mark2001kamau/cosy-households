name: Jekyll site CI/CD

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Docker
        run: |
          docker run \
          -v ${{ github.workspace }}:/srv/jekyll \
          jekyll/builder:latest /bin/bash -c "chmod -R 777 /srv/jekyll && jekyll build"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.JEKYLLDEPLOYTOKEN22 }}
          branch: gh-pages # This creates/updates a branch for your live site
          folder: _site   # This is where Jekyll puts your finished HTML/CSS
